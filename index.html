<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행지 추천</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;900&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #f5f0e8;
    --bark: #8b6e4e;
    --moss: #4a5e48;
    --sky: #6d9bb5;
    --sunset: #d4785a;
    --ink: #1e1a16;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--sand);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(109,155,181,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(212,120,90,0.1) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%238b6e4e' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 60px 24px 80px; }
  header { text-align: center; margin-bottom: 56px; animation: fadeDown 0.8s ease both; }
  .eyebrow { font-family: 'Noto Serif KR', serif; font-size: 11px; letter-spacing: 4px; color: var(--bark); text-transform: uppercase; margin-bottom: 16px; opacity: 0.8; }
  h1 { font-family: 'DM Serif Display', serif; font-size: clamp(42px, 8vw, 72px); font-weight: 400; color: var(--ink); line-height: 1.05; }
  h1 em { font-style: italic; color: var(--sunset); }
  .subtitle { font-size: 14px; color: var(--bark); font-weight: 300; letter-spacing: 0.5px; margin-top: 12px; }
  .divider { display: flex; align-items: center; gap: 16px; margin: 40px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--bark), transparent); opacity: 0.3; }
  .divider-icon { color: var(--bark); font-size: 18px; opacity: 0.5; }
  .form-card { background: rgba(255,255,255,0.55); border: 1px solid rgba(139,110,78,0.15); border-radius: 4px; padding: 40px 40px 36px; backdrop-filter: blur(8px); box-shadow: 0 4px 40px rgba(30,26,22,0.06); animation: fadeUp 0.8s 0.2s ease both; }
  .question-block { margin-bottom: 32px; }
  .question-label { font-family: 'Noto Serif KR', serif; font-size: 13px; font-weight: 600; color: var(--bark); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; display: block; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip { cursor: pointer; padding: 9px 18px; border: 1.5px solid rgba(139,110,78,0.3); border-radius: 2px; font-size: 13.5px; font-weight: 400; color: var(--ink); background: transparent; transition: all 0.2s ease; user-select: none; font-family: 'Noto Sans KR', sans-serif; }
  .chip:hover { border-color: var(--ink); }
  .chip.selected { background: var(--ink); border-color: var(--ink); color: var(--sand); }
  .submit-btn { width: 100%; padding: 16px; background: var(--ink); color: var(--sand); border: none; border-radius: 2px; font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 600; letter-spacing: 2px; cursor: pointer; transition: background 0.25s ease; margin-top: 8px; }
  .submit-btn:hover { background: var(--sunset); }
  .results { display: none; animation: fadeUp 0.6s ease both; }
  .results.active { display: block; }
  .results-header { text-align: center; margin-bottom: 36px; }
  .results-header h2 { font-family: 'DM Serif Display', serif; font-size: 32px; font-weight: 400; margin-bottom: 6px; }
  .results-header p { font-size: 13px; color: var(--bark); font-weight: 300; }
  .destination-card { background: rgba(255,255,255,0.6); border: 1px solid rgba(139,110,78,0.15); border-radius: 4px; padding: 28px 32px; margin-bottom: 16px; backdrop-filter: blur(8px); box-shadow: 0 2px 20px rgba(30,26,22,0.05); animation: fadeUp 0.5s ease both; transition: transform 0.2s, box-shadow 0.2s; }
  .destination-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(30,26,22,0.1); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 12px; }
  .dest-name { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; color: var(--ink); line-height: 1.2; }
  .dest-country { font-size: 11px; letter-spacing: 2px; color: var(--bark); text-transform: uppercase; margin-top: 4px; opacity: 0.7; }
  .match-badge { background: var(--moss); color: white; font-size: 11px; padding: 4px 10px; border-radius: 2px; letter-spacing: 1px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .dest-desc { font-size: 13.5px; line-height: 1.75; color: #4a4035; margin-bottom: 14px; font-weight: 300; }
  .dest-tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .dest-tag { font-size: 11px; padding: 3px 10px; border: 1px solid rgba(139,110,78,0.25); border-radius: 2px; color: var(--bark); letter-spacing: 0.5px; }
  .tip-block { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(139,110,78,0.12); font-size: 12.5px; color: #4a6e7a; line-height: 1.6; }
  .tip-block strong { font-weight: 600; color: var(--moss); }
  .reset-btn { display: block; margin: 32px auto 0; background: transparent; border: 1.5px solid rgba(139,110,78,0.3); color: var(--bark); padding: 10px 28px; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; letter-spacing: 1.5px; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
  .reset-btn:hover { border-color: var(--bark); background: var(--bark); color: white; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 600px) { .form-card { padding: 28px 20px; } .destination-card { padding: 22px 20px; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <p class="eyebrow">✦ Travel Compass ✦</p>
    <h1>어디로<br><em>떠날까요</em></h1>
    <p class="subtitle">당신의 여행 스타일에 꼭 맞는 여행지를 찾아드릴게요</p>
  </header>

  <div class="form-card" id="formCard">
    <div class="question-block">
      <span class="question-label">누구와 함께?</span>
      <div class="chip-group" id="companions">
        <div class="chip" data-value="혼자">🧳 혼자</div>
        <div class="chip" data-value="친구">👫 친구들과</div>
        <div class="chip" data-value="연인">💑 연인과</div>
        <div class="chip" data-value="가족">👨‍👩‍👧 가족과</div>
      </div>
    </div>
    <div class="question-block">
      <span class="question-label">어디로?</span>
      <div class="chip-group" id="region">
        <div class="chip" data-value="국내">🏠 국내</div>
        <div class="chip" data-value="아시아">🌏 아시아</div>
        <div class="chip" data-value="유럽">🌍 유럽</div>
        <div class="chip" data-value="미주·오세아니아">🌎 미주·오세아니아</div>
      </div>
    </div>
    <div class="question-block">
      <span class="question-label">여행 스타일?</span>
      <div class="chip-group" id="style">
        <div class="chip" data-value="자연·힐링">🌿 자연·힐링</div>
        <div class="chip" data-value="도시·문화">🏙 도시·문화</div>
        <div class="chip" data-value="음식·맛집">🍜 음식·맛집</div>
        <div class="chip" data-value="액티비티·모험">🏄 액티비티·모험</div>
        <div class="chip" data-value="역사·예술">🏛 역사·예술</div>
        <div class="chip" data-value="휴양·바다">🏖 휴양·바다</div>
      </div>
    </div>
    <div class="question-block">
      <span class="question-label">여행 기간?</span>
      <div class="chip-group" id="duration">
        <div class="chip" data-value="당일">📍 당일치기</div>
        <div class="chip" data-value="단기">🌙 1~2박</div>
        <div class="chip" data-value="중기">✈️ 3~5박</div>
        <div class="chip" data-value="장기">🗺 1주일+</div>
      </div>
    </div>
    <div class="question-block" style="margin-bottom:8px">
      <span class="question-label">예산 수준?</span>
      <div class="chip-group" id="budget">
        <div class="chip" data-value="알뜰">💸 알뜰하게</div>
        <div class="chip" data-value="중간">💳 적당히</div>
        <div class="chip" data-value="여유">💎 여유롭게</div>
      </div>
    </div>
    <div class="divider"><span class="divider-icon">✦</span></div>
    <button class="submit-btn" onclick="getRecommendations()">여행지 추천받기</button>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <h2>✦ 추천 여행지</h2>
      <p id="resultSubtitle"></p>
    </div>
    <div id="destList"></div>
    <button class="reset-btn" onclick="resetForm()">↩ 다시 선택하기</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// 여행지 데이터베이스
// ─────────────────────────────────────────────
const DB = {
  "국내": {
    "자연·힐링": [
      { name:"제주 사려니숲길", loc:"제주도", badge:"힐링 숲길", desc:"삼나무와 편백이 뒤덮인 사려니숲길은 15.1km의 숲 트레일로, 피톤치드가 가득한 초록 터널 속을 걷다 보면 머릿속이 맑아지는 기분이에요. 제주에서 가장 조용하고 깊은 힐링을 선사해요.", tags:["숲길","피톤치드","트레킹"], tip:"물찻오름 입구에서 출발해 붉은오름까지 편도로 걷는 코스가 인기예요. 이른 아침 안개 낀 날이 가장 신비로워요." },
      { name:"강원 인제 자작나무숲", loc:"강원도", badge:"하얀 숲의 기적", desc:"수만 그루의 자작나무가 빽빽하게 들어선 인제 원대리 자작나무숲은 겨울엔 설경, 가을엔 단풍과 어우러져 사계절 다른 감동을 줘요. 국내에서 이런 풍경은 여기뿐이에요.", tags:["자작나무","설경","포토스팟"], tip:"탐방 예약은 미리 해야 해요. 아침 일찍 방문할수록 안개와 빛이 어우러져 환상적인 분위기예요." },
      { name:"전남 담양 메타세쿼이아길", loc:"전라남도", badge:"가로수 명소", desc:"20~30m 높이의 메타세쿼이아가 양쪽으로 늘어선 가로수길은 봄의 연초록, 가을의 황금빛, 겨울의 설경 모두가 엽서 같은 풍경이에요.", tags:["가로수","포토스팟","드라이브"], tip:"죽녹원과 함께 반나절 코스로 묶으면 완벽해요. 자전거 대여 후 라이딩도 인기예요." },
      { name:"경남 남해 다랭이마을", loc:"경상남도", badge:"계단식 논 명소", desc:"가파른 해안 절벽을 따라 100개 넘는 계단식 논이 펼쳐진 다랭이마을은 유럽 어딘가처럼 이국적인 풍경을 자랑해요. 봄 유채꽃 시즌이 가장 아름다워요.", tags:["계단식논","유채꽃","해안"], tip:"마을 뒤편 설흘산까지 올라가면 다랭이마을 전체를 한눈에 내려다볼 수 있어요." },
      { name:"강원 평창 대관령 양떼목장", loc:"강원도", badge:"목가적 풍경", desc:"해발 900m 고원의 드넓은 초원에서 양들이 풀을 뜯는 풍경은 한국이 아닌 것 같은 이국적 힐링을 선사해요. 운해가 깔리는 날 아침이 특히 장관이에요.", tags:["목장","운해","고원"], tip:"겨울엔 눈 덮인 목장이 알프스 못지않게 아름다워요. 양먹이 체험도 할 수 있어요." },
      { name:"경북 청송 주왕산", loc:"경상북도", badge:"기암절벽 계곡", desc:"주상절리 절벽과 폭포가 어우러진 주왕산은 '제3의 설악'이라 불릴 만큼 빼어난 경관을 자랑해요. 가을 단풍과 계곡이 만나면 그야말로 절경이에요.", tags:["기암절벽","폭포","단풍"], tip:"주방천 계곡을 따라 1코스(주왕계곡)로 걸으면 당일치기로 핵심을 다 볼 수 있어요." },
      { name:"전북 진안 마이산", loc:"전라북도", badge:"두 봉우리의 기적", desc:"암마이봉과 수마이봉 두 봉우리가 말의 귀처럼 솟아있는 마이산은 봄철 벚꽃과 어우러지면 세상에서 가장 기묘하고 아름다운 풍경을 만들어요.", tags:["기암","봄꽃","탑사"], tip:"이른 아침 탑사 앞 안개와 두 봉우리가 어우러지는 풍경은 사진 작가들이 특히 사랑하는 명소예요." },
      { name:"강원 영월 한반도지형", loc:"강원도", badge:"지형의 기적", desc:"강물이 굽이굽이 흘러 만든 지형이 한반도 모양과 꼭 닮은 영월의 명소예요. 선암마을 전망대에서 내려다보는 풍경은 자연의 위대함에 감탄하게 해요.", tags:["한반도지형","강원도","전망대"], tip:"전망대까지 오르는 길이 꽤 가파르지만 정상에서 보는 풍경이 보상해줘요." },
      { name:"충남 태안 청산수목원", loc:"충청남도", badge:"꽃의 정원", desc:"수련꽃 연못과 팜카밀레 허브정원이 유럽 감성을 뿜어내는 태안의 숨은 명소예요. 특히 여름 수련꽃 시즌엔 마치 모네의 그림 속에 들어온 것 같아요.", tags:["수련","허브정원","유럽감성"], tip:"꽃지해수욕장과 함께 묶어서 1박 2일 태안 여행 코스로 즐기면 완벽해요." },
      { name:"경남 창녕 우포늪", loc:"경상남도", badge:"국내 최대 내륙습지", desc:"1억 4천만 년 전부터 존재한 우포늪은 국내 최대 내륙 습지로 두루미, 재두루미 등 희귀 새들의 낙원이에요. 새벽 물안개 속 풍경이 영화 같아요.", tags:["습지","철새","생태여행"], tip:"자전거를 빌려 우포늪 둘레길을 돌면 4~5시간으로 넉넉히 즐길 수 있어요." }
    ],
    "도시·문화": [
      { name:"서울 성수동", loc:"서울", badge:"힙스터의 성지", desc:"공장이 카페와 갤러리로 탈바꿈한 성수동은 팝업스토어와 로컬 브랜드가 집결한 서울에서 가장 트렌디한 동네예요. 주말마다 새로운 팝업이 열려요.", tags:["팝업스토어","카페","힙스터"], tip:"성수역 2번 출구에서 나와 무작정 골목을 헤매는 게 성수동을 즐기는 방법이에요." },
      { name:"부산 감천문화마을", loc:"부산", badge:"알록달록 마을", desc:"산비탈을 따라 알록달록한 집들이 계단처럼 쌓인 감천문화마을은 부산의 마추픽추라 불려요. 골목마다 숨어있는 예술 작품을 찾는 재미가 쏠쏠해요.", tags:["벽화마을","예술","포토스팟"], tip:"마을 입구에서 지도를 구입하면 숨겨진 포토스팟을 모두 찾을 수 있어요. 아침 일찍 방문하면 한산해요." },
      { name:"전주 한옥마을", loc:"전라북도", badge:"전통의 살아있는 도시", desc:"700여 채의 한옥이 보존된 전주 한옥마을에서 한복을 입고 경기전, 전동성당을 걸으면 시간 여행을 하는 기분이에요. 비빔밥과 막걸리도 필수예요.", tags:["한옥","한복","전통문화"], tip:"경기전 야간 개장 시즌에 방문하면 조명 받은 한옥의 아름다움이 배가돼요." },
      { name:"경주 황리단길", loc:"경상북도", badge:"레트로 핫플", desc:"천년 고도 경주의 황리단길은 한옥을 개조한 감성 카페와 식당이 늘어선 골목이에요. 대릉원 고분과 맞닿아 있어 자전거로 역사와 힙한 감성을 동시에 즐길 수 있어요.", tags:["레트로","한옥카페","자전거"], tip:"자전거를 빌려 황리단길에서 대릉원, 첨성대, 안압지까지 이어지는 코스가 경주 여행의 정석이에요." },
      { name:"인천 개항로", loc:"인천", badge:"근대문화 거리", desc:"1880년대 일제강점기 건물들이 카페와 식당, 게스트하우스로 재탄생한 개항로는 근대와 현재가 공존하는 독특한 분위기예요. 차이나타운과 연결돼 하루 코스로 완벽해요.", tags:["근대건축","카페","차이나타운"], tip:"송월동 동화마을과 자유공원까지 함께 걸으면 인천 문화 탐방이 알차게 완성돼요." },
      { name:"파주 헤이리 예술마을", loc:"경기도", badge:"예술가들의 마을", desc:"건축가, 화가, 작가들이 모여 만든 헤이리 예술마을은 독특한 건축물과 갤러리, 서점, 카페가 어우러져 하루 종일 걸어도 질리지 않아요.", tags:["갤러리","예술건축","카페"], tip:"출판도시 지혜의숲과 함께 반나절씩 나눠 방문하면 파주 문화 여행으로 완성돼요." },
      { name:"강릉 안목해변 카페거리", loc:"강원도", badge:"커피 도시의 상징", desc:"바다를 바라보며 커피를 마시는 안목해변 카페거리는 강릉이 왜 커피 도시인지 증명해요. 테이크아웃 커피를 들고 해변 산책하는 게 강릉 여행의 기본 코스예요.", tags:["커피","바다뷰","카페거리"], tip:"커피 커퍼 박물관과 안목해변을 연결해서 강릉 커피 투어를 즐겨보세요." },
      { name:"통영 동피랑 벽화마을", loc:"경상남도", badge:"바다 위 벽화마을", desc:"동피랑 언덕에 오르면 통영 강구안과 쪽빛 바다가 한눈에 펼쳐져요. 골목마다 그려진 벽화와 탁 트인 바다 뷰가 통영 여행을 특별하게 만들어요.", tags:["벽화마을","바다뷰","골목"], tip:"서피랑과 동피랑을 연결하는 골목 투어 코스로 통영 구도심을 깊이 탐방해보세요." },
      { name:"광주 양림동", loc:"광주", badge:"근현대 문화마을", desc:"100년 된 선교사 주택과 현대 예술 공간이 공존하는 양림동은 5·18의 역사와 광주 근대 문화를 함께 느낄 수 있는 유니크한 동네예요.", tags:["선교사주택","5·18","벽화"], tip:"펭귄마을의 유머러스한 폐품 설치 예술은 광주 양림동의 유명한 숨은 명소예요." },
      { name:"속초 아바이마을", loc:"강원도", badge:"실향민의 역사", desc:"함경도 실향민들이 터 잡은 아바이마을은 갯배를 타고 건너가는 재미와 아바이순대·오징어순대의 진한 맛, 청호호 전망이 어우러진 속초의 숨은 명소예요.", tags:["갯배","아바이순대","실향민문화"], tip:"갯배 줄을 직접 잡아당겨 건너는 체험이 특별해요. 배에 오르면 바로 옆 식당들이 즐비해요." }
    ],
    "음식·맛집": [
      { name:"전주 남부시장 야시장", loc:"전라북도", badge:"한식의 성지", desc:"비빔밥, 콩나물국밥의 고장 전주. 남부시장 야시장에서는 저렴하게 전주 길거리 음식을 실컷 즐길 수 있어요. 막걸리 골목도 전주 미식 여행의 핵심이에요.", tags:["비빔밥","야시장","막걸리"], tip:"야시장은 금·토요일 저녁에만 열려요. 청년몰도 함께 구경하면 더욱 알차요." },
      { name:"부산 자갈치시장", loc:"부산", badge:"해산물 천국", desc:"싱싱한 회와 해산물을 직접 골라 먹을 수 있는 자갈치시장은 부산 여행의 필수 코스예요. 씨앗호떡, 어묵은 길거리 간식으로도 최고예요.", tags:["회","해산물","어묵"], tip:"시장 2층에서 아래층에서 고른 해산물을 조리해 먹을 수 있어요. 광어·우럭이 가성비 좋아요." },
      { name:"강릉 초당순두부마을", loc:"강원도", badge:"동해 바닷물 순두부", desc:"동해 바닷물로 만든 초당 순두부는 강릉에서만 먹을 수 있는 특별한 맛이에요. 콩의 부드러운 풍미가 그대로 살아있는 순두부찌개는 아침 식사로도 완벽해요.", tags:["순두부","동해","아침식사"], tip:"초당마을 내 식당들은 대부분 오전에 줄이 길어요. 9시 이전에 방문하면 여유롭게 즐길 수 있어요." },
      { name:"목포 원도심 맛집골목", loc:"전라남도", badge:"남도 해산물 미식", desc:"세발낙지, 홍어삼합, 민어회, 꽃게탕까지 목포의 원도심 골목은 전라도 해산물 요리의 진수를 저렴하게 맛볼 수 있는 보고예요.", tags:["세발낙지","홍어","민어"], tip:"목포역 앞 먹자골목과 유달동 골목에 로컬 맛집들이 밀집해 있어요. 가격도 서울보다 훨씬 저렴해요." },
      { name:"속초·양양 중앙시장", loc:"강원도", badge:"동해 먹거리", desc:"닭강정, 오징어순대, 대게, 홍게까지 속초 중앙시장은 동해의 풍요로운 해산물 먹거리가 집결한 곳이에요. 아바이마을 순대와 함께하면 금상첨화예요.", tags:["닭강정","대게","동해먹거리"], tip:"닭강정은 오픈 시간에 맞춰 가야 따뜻하게 먹을 수 있어요. 현금을 미리 준비하세요." },
      { name:"대구 동인동 찜갈비골목", loc:"대구", badge:"갈비찜의 성지", desc:"대구에서만 먹을 수 있는 얼큰하고 달콤한 찜갈비는 전국에서 원정 오는 사람이 있을 만큼 독보적인 맛이에요. 납작만두와 뭉티기도 꼭 함께 즐겨야 해요.", tags:["찜갈비","납작만두","뭉티기"], tip:"동인동 찜갈비 골목은 점심보다 저녁 시간대가 웨이팅이 더 짧은 편이에요." },
      { name:"광양 불고기거리", loc:"전라남도", badge:"전국 최고 불고기", desc:"숯불에 구운 얇은 광양 불고기는 전국에서 최고라는 평가를 받아요. 불고기 한 점에 밥 한 숟가락, 된장찌개를 곁들이는 광양식 식사법이 따로 있어요.", tags:["불고기","숯불","전라도"], tip:"광양읍 불고기 타운의 식당들은 대부분 점심부터 문을 열어요. 배를 비우고 가는 게 예의예요." },
      { name:"제주 동문시장·야시장", loc:"제주도", badge:"제주 로컬 먹거리", desc:"흑돼지, 고등어회, 옥돔, 빙떡, 오메기떡까지 제주 특산 먹거리가 총집합한 동문시장은 제주 미식 여행의 시작점이에요. 저녁엔 야시장이 열려 더욱 활기차요.", tags:["흑돼지","고등어회","야시장"], tip:"야시장은 저녁 7시 30분부터 자정까지 운영해요. 한라봉 주스와 흑돼지 꼬치는 필수예요." },
      { name:"군산 이성당·근대거리", loc:"전라북도", badge:"80년 전통 빵집", desc:"1945년 창업한 국내 최고령 빵집 이성당의 단팥빵과 야채빵은 군산의 아이콘이에요. 일제강점기 건물이 남아있는 근대역사거리와 함께하면 군산 여행이 완성돼요.", tags:["단팥빵","근대거리","군산짬뽕"], tip:"이성당은 오픈 전부터 줄이 생겨요. 빵과 함께 군산 짬뽕도 꼭 드셔보세요." },
      { name:"춘천 닭갈비·막국수 골목", loc:"강원도", badge:"춘천 양대 음식", desc:"춘천 명동 닭갈비 골목에서 즐기는 철판 닭갈비는 전국 최고예요. 닭갈비 먹은 뒤 볶음밥은 필수이고, 후식으로 메밀 막국수까지 먹어야 춘천 미식 여행이 완성돼요.", tags:["닭갈비","막국수","볶음밥"], tip:"닭갈비 먹은 뒤 남이섬으로 가는 코스가 춘천 1박 2일 여행의 정석이에요." }
    ],
    "액티비티·모험": [
      { name:"강원 양양 서핑", loc:"강원도", badge:"국내 서핑 성지", desc:"죽도해변, 인구해변, 기사문해변까지 양양은 국내 서핑의 1번지예요. 초보자도 강습을 받으면 반나절 만에 파도를 탈 수 있어요. 힙한 서핑 카페 문화도 덤이에요.", tags:["서핑","여름","힙스터"], tip:"서핑 강습은 2시간에 5~8만 원 수준이에요. 6~9월 시즌에 방문하면 파도 조건이 가장 좋아요." },
      { name:"경기 가평 래프팅·집라인", loc:"경기도", badge:"수도권 레포츠 1번지", desc:"북한강과 용소계곡에서 즐기는 래프팅과 클라이밍, 짚라인까지 가평은 수도권에서 가장 다양한 레포츠를 즐길 수 있는 당일치기 어드벤처 코스예요.", tags:["래프팅","짚라인","당일치기"], tip:"남이섬, 쁘띠프랑스와 함께 묶으면 가평 1박 2일 여행으로 완성돼요." },
      { name:"충북 단양 래프팅·패러글라이딩", loc:"충청북도", badge:"내륙 액티비티 성지", desc:"남한강 래프팅, 만천하스카이워크, 패러글라이딩까지 단양은 내륙에서 즐길 수 있는 스릴 넘치는 액티비티가 집결한 곳이에요.", tags:["래프팅","패러글라이딩","스카이워크"], tip:"만천하 스카이워크에서 짚와이어를 타고 남한강 위를 날아가는 체험이 인기예요." },
      { name:"제주 스쿠버다이빙", loc:"제주도", badge:"수중 탐험", desc:"문섬, 범섬 주변의 제주 바닷속엔 화려한 연산호와 자리돔이 가득해요. 스쿠버 자격증 없이도 체험 다이빙으로 수중 세계를 경험할 수 있어요.", tags:["다이빙","스노클링","연산호"], tip:"서귀포 문섬 주변이 시야와 산호가 가장 좋아요. 체험 다이빙은 4~11월이 적기예요." },
      { name:"강원 태백 스키·설경 트레킹", loc:"강원도", badge:"겨울 스포츠 천국", desc:"태백산 눈꽃 트레킹과 하이원·용평·비발디파크 스키장까지 강원도 겨울은 국내 최고의 설원 스포츠 성지예요. 태백산 주목 군락지 설경은 압도적이에요.", tags:["스키","눈꽃트레킹","주목"], tip:"1월~2월 주중에 방문하면 스키장 리프트 대기가 거의 없어요." },
      { name:"전남 완도 카약·스노클링", loc:"전라남도", badge:"청정 해양 스포츠", desc:"청산도와 보길도를 품은 완도 앞바다는 투명하고 따뜻한 물이 카약과 스노클링에 최적이에요. 섬 주변의 다채로운 해양 생물을 만날 수 있어요.", tags:["카약","스노클링","청정바다"], tip:"청산도 슬로길과 카약을 묶어서 1박 2일 완도 여행으로 즐겨보세요." },
      { name:"경남 통영 스카이라인 루지", loc:"경상남도", badge:"바다뷰 루지", desc:"미륵산에서 출발해 바다를 바라보며 내려오는 스카이라인 루지는 통영의 대표 체험 명소예요. 짜릿한 속도감과 쪽빛 바다 조망이 동시에 펼쳐져요.", tags:["루지","바다뷰","스릴"], tip:"케이블카로 올라가 루지로 내려오는 세트 패키지가 가성비 좋아요." },
      { name:"강원 정선 짚와이어·레일바이크", loc:"강원도", badge:"고원 어드벤처", desc:"정선 아리랑의 고향 정선에서 짚와이어를 타고 조양강을 가로지르거나 협곡 사이로 레일바이크를 타는 경험은 강원 여행의 특별한 추억이 돼요.", tags:["짚와이어","레일바이크","협곡"], tip:"민둥산 억새밭(10월)과 함께 묶으면 정선 가을 여행의 완벽한 코스예요." },
      { name:"제주 한라산 등반", loc:"제주도", badge:"국내 최고봉 도전", desc:"해발 1950m 한라산은 성판악 코스와 관음사 코스로 정상인 백록담까지 오를 수 있어요. 눈꽃 핀 겨울 한라산은 특히 장엄해요.", tags:["등반","백록담","눈꽃"], tip:"성판악 코스(9.6km)가 가장 인기예요. 탐방 예약은 필수이고 새벽 일찍 출발해야 해요." },
      { name:"경기 연천 한탄강 래프팅", loc:"경기도", badge:"주상절리 협곡 래프팅", desc:"화산이 만든 주상절리 협곡 사이를 래프팅으로 내려가는 한탄강 체험은 서울 근교에서 즐기는 최고의 자연 어드벤처예요.", tags:["래프팅","주상절리","협곡"], tip:"6~8월 장마 이후 수량이 풍부할 때가 스릴이 최고예요. 당일치기로 서울에서 충분히 다녀올 수 있어요." }
    ],
    "역사·예술": [
      { name:"경주 야경 투어", loc:"경상북도", badge:"신라 천년의 빛", desc:"첨성대, 동궁과 월지, 대릉원 돌담길까지 야간 조명을 받은 경주는 낮과는 전혀 다른 매력을 품어요. 황리단길 카페와 함께하면 경주 야경 여행이 완성돼요.", tags:["야경","첨성대","동궁과월지"], tip:"동궁과 월지(안압지)의 야간 조명은 경주 야경의 하이라이트예요. 봄 벚꽃 시즌이 가장 아름다워요." },

      { name:"공주·부여 백제 역사 투어", loc:"충청남도", badge:"백제 문화의 정수", desc:"무령왕릉, 공산성, 낙화암, 궁남지까지 백제의 찬란한 역사가 살아숨쉬는 공주·부여는 유네스코 세계문화유산 여행지예요.", tags:["백제","무령왕릉","유네스코"], tip:"국립공주박물관 관람 후 무령왕릉을 방문하면 역사적 이해가 훨씬 깊어져요." },
      { name:"안동 하회마을·도산서원", loc:"경상북도", badge:"유교 문화의 본향", desc:"세계문화유산 하회마을은 600년 된 씨족 마을로 고택과 서낭당이 그대로 남아있어요. 도산서원, 봉정사와 함께하면 안동 역사 여행이 완성돼요.", tags:["하회마을","유교","탈춤"], tip:"주말 하회별신굿탈놀이 공연은 하회마을 방문의 하이라이트예요. 미리 시간을 확인하세요." },

      { name:"수원 화성", loc:"경기도", badge:"조선 최고의 성곽", desc:"정조의 효심과 개혁 의지가 담긴 수원 화성은 동양 최고 수준의 성곽 건축이에요. 성벽을 따라 걷는 투어와 야간 화성 관람이 특히 인상적이에요.", tags:["성곽","유네스코","야경"], tip:"화성열차를 타고 주요 포루를 돌아보거나, 야간 화성 투어로 전혀 다른 분위기를 즐길 수 있어요." },
      { name:"서울 인사동·북촌", loc:"서울", badge:"전통 예술의 거리", desc:"갤러리, 공방, 전통 찻집이 밀집한 인사동과 600년 된 한옥들이 남아있는 북촌은 서울 전통 문화의 핵심이에요. 북촌 8경을 따라 걸으며 서울의 전통미를 느껴보세요.", tags:["갤러리","한옥","공방"], tip:"낙원상가 옥상에서 인사동 전경을 내려다보는 숨겨진 뷰포인트도 꼭 가보세요." },
      { name:"전남 나주 영산강 역사 투어", loc:"전라남도", badge:"고대 마한의 흔적", desc:"마한·백제의 역사 현장인 나주 복암리 고분군, 국립나주박물관, 나주읍성이 잘 보존되어 있어요. 나주곰탕까지 곁들이면 역사와 미식이 만나는 여행이 완성돼요.", tags:["고분","마한","나주곰탕"], tip:"나주곰탕은 아침부터 문 여는 로컬 식당들이 가장 진국이에요." },
      { name:"서울 을지로·DDP", loc:"서울", badge:"산업유산+현대건축", desc:"레트로 인쇄골목과 자하 하디드의 DDP가 공존하는 을지로·동대문은 서울에서 가장 극적인 시간의 대비를 경험할 수 있는 곳이에요.", tags:["DDP","레트로","을지로"], tip:"을지로 인쇄 골목 사이에 숨어있는 힙한 카페·바를 찾아다니는 재미가 있어요." },

    "휴양·바다": [
      { name:"제주 협재·금능해변", loc:"제주도", badge:"에메랄드 바다", desc:"하얀 모래와 에메랄드빛 바다, 비양도가 배경으로 펼쳐지는 협재·금능해변은 국내에서 가장 이국적인 해변이에요. 썰물 때엔 비양도까지 걸어갈 수 있어요.", tags:["에메랄드","비양도","스노클링"], tip:"협재에서 금능 방향으로 걸으면서 보는 바다색이 계속 바뀌는 풍경이 압권이에요." },

      { name:"강원 강릉 경포해변", loc:"강원도", badge:"동해 대표 해변", desc:"드넓은 백사장과 경포호가 어우러진 경포는 동해 최대 해수욕장이에요. 안목 카페거리, 오죽헌과 함께하면 강릉 여행 코스로 완벽해요.", tags:["동해","백사장","피서"], tip:"경포호에서 자전거를 빌려 경포해변까지 이어지는 자전거길이 30분으로 쾌적해요." },

      { name:"충남 태안 꽃지해수욕장", loc:"충청남도", badge:"서해 낙조 명소", desc:"할미·할아비바위 앞으로 지는 서해 낙조는 국내 최고의 일몰 명소로 꼽혀요. 봄이면 천리포수목원의 목련과 함께하면 태안 여행이 완성돼요.", tags:["낙조","서해","할미할아비바위"], tip:"일몰 30분 전 꽃지해수욕장에 자리 잡고 노을이 물드는 과정을 지켜보세요." },
      { name:"경북 울릉도·독도", loc:"경상북도", badge:"대한민국 끝 섬", desc:"육지에서 가장 먼 울릉도는 화산이 만든 절벽 해안과 맑은 바다, 나리분지의 독특한 식생이 살아있는 신비로운 섬이에요. 독도 투어도 함께 즐겨보세요.", tags:["독도","화산지형","청정바다"], tip:"배편이 날씨에 따라 결항될 수 있어 최소 3박 이상의 여유 있는 일정이 필요해요." },
      { name:"부산 해운대·광안리", loc:"부산", badge:"도시+바다 완벽 조화", desc:"해운대 마린시티 야경과 광안대교가 반짝이는 광안리 야경은 부산을 다른 국내 해변 도시와 구별짓는 독보적인 경쟁력이에요.", tags:["야경","광안대교","도시해변"], tip:"광안리 조개구이 골목에서 야경을 안주 삼아 조개구이를 즐기는 게 부산 여행의 낭만이에요." },

  "아시아": {

      { name:"베트남 사파 계단식 논", loc:"베트남 북부", badge:"2025 핫플 급부상", desc:"중국 국경 인근 해발 1600m 고원에 펼쳐진 사파의 계단식 논은 봄엔 연초록, 가을엔 황금빛으로 물들어요. 소수민족 흐몽족 마을을 트레킹하며 만나는 진짜 베트남을 경험할 수 있어요.", tags:["계단식논","소수민족","트레킹"], tip:"9~10월 황금빛 벼 수확 시기가 가장 아름다워요. 하노이에서 기차(야간열차 추천)+버스로 이동해요." },
      { name:"일본 야쿠시마 삼나무숲", loc:"일본 가고시마현", badge:"원시 자연의 경이", desc:"수령 7200년의 조몬 삼나누가 서있는 야쿠시마는 원시 자연이 살아있는 유네스코 자연유산이에요. 이끼 덮인 숲 바닥과 안개가 어우러져 마치 다른 행성에 온 것 같아요.", tags:["삼나무","유네스코","트레킹"], tip:"조몬 삼나무 트레킹은 왕복 22km, 10시간 코스예요. 체력 준비와 방수 장비가 필수예요." },

      { name:"인도네시아 발리 우붓 라이스테라스", loc:"인도네시아 발리", badge:"힐링의 성지", desc:"테갈랄랑 계단식 논과 우붓 주변 정글은 전 세계 힐링 여행자들의 성지예요. 요가 리트릿, 아유르베다 스파, 일출 사원 기도까지 몸과 마음을 함께 치유해요.", tags:["계단식논","요가","스파"], tip:"우붓 왕궁 앞 케착 댄스 공연은 매일 저녁 진행돼요. 사전 예약 추천해요." },
      { name:"중국 구채구·황룡", loc:"중국 쓰촨성", badge:"오색 빛의 호수", badge:"오색 호수 절경", desc:"에메랄드, 청록, 코발트블루가 뒤섞인 구채구의 호수들은 지구상 실존하는 가장 아름다운 색깔의 물을 보여줘요. 유네스코 자연유산으로 사계절 다른 경이로움을 선사해요.", tags:["에메랄드호수","유네스코","폭포"], tip:"이른 아침 방문이 관광객이 적고 빛 반사가 가장 아름다워요. 입장권 사전 예약 필수예요." },
      { name:"필리핀 팔라완 엘니도", loc:"필리핀 팔라완", badge:"숨겨진 석호 낙원", desc:"석회암 절벽 사이 숨겨진 빅라군과 스몰라군을 카약으로 탐험하는 엘니도는 필리핀 여행의 하이라이트예요. 세상 어디서도 볼 수 없는 에메랄드빛 바다가 기다려요.", tags:["라군","카약","에메랄드"], tip:"투어 A(빅라군·스몰라군)가 가장 인기예요. 우기(6~11월)는 파도가 강해 라군 입장이 제한될 수 있어요." },

      { name:"베트남 하노이 쌀국수 투어", loc:"베트남 하노이", badge:"쌀국수의 본고장", desc:"하노이식 포(Phở)는 맑고 깊은 국물이 특징이에요. 분짜, 반미, 분보남보, 카페 쭝까지 하노이 36거리 골목 식당들이 자아내는 길거리 미식 문화는 세계 최고예요.", tags:["쌀국수","분짜","에그커피"], tip:"포 박(Phở Bắc)은 북부식 쌀국수예요. 하노이의 포 10, 포 티으엉 식당이 가장 유명해요." },

      { name:"대만 타이베이 야시장 투어", loc:"대만 타이베이", badge:"야시장 문화 1번지", desc:"스린, 라오허지에, 닝샤 야시장까지 타이베이 야시장은 루로우판, 굴전, 망고빙수, 대만 소시지 등 대만 음식의 모든 것을 한 곳에서 즐길 수 있어요.", tags:["루로우판","망고빙수","야시장"], tip:"스린 야시장은 지하 먹거리 코너 규모가 커서 다양한 음식을 한 번에 맛볼 수 있어요. 저녁 6시 이후 방문해요." },

    "액티비티·모험": [
      { name:"네팔 에베레스트 베이스캠프 트레킹", loc:"네팔 히말라야", badge:"인생 트레킹", desc:"세계의 지붕을 향해 14일간 걷는 EBC 트레킹은 인간이 걸을 수 있는 가장 장엄한 길이에요. 해발 5364m 베이스캠프에서 에베레스트를 올려다보는 순간 눈물이 나요.", tags:["히말라야","트레킹","에베레스트"], tip:"고산병 예방을 위해 루클라에서 남체바자르까지 천천히 고도를 높여야 해요. 10~11월, 3~5월이 최적 시즌이에요." },
      { name:"태국 코따오 스쿠버 다이빙", loc:"태국 수랏타니", badge:"세계 최고 가성비 다이빙", desc:"세계에서 가장 저렴하게 PADI 스쿠버 자격증을 취득할 수 있는 코따오는 맑은 바다와 다양한 해양 생물로 전 세계 다이버들이 모여드는 성지예요.", tags:["스쿠버","PADI자격증","산호초"], tip:"PADI 오픈워터 코스는 4일이면 완료돼요. 3~9월이 시야가 가장 좋은 시즌이에요." },
      { name:"인도네시아 발리 서핑", loc:"인도네시아 발리", badge:"서핑 성지", desc:"꾸따, 짱구, 울루와뚜까지 발리는 레벨별로 다양한 파도를 즐길 수 있는 세계적인 서핑 명소예요. 초보자는 꾸따에서, 중급 이상은 울루와뚜를 추천해요.", tags:["서핑","꾸따","울루와뚜"], tip:"울루와뚜 클리프 위 선셋은 서핑 후 즐기는 최고의 보상이에요. 반바지 차림으로는 사원 입장이 안 돼요." },

      { name:"중국 장가계 트레킹·글라스브릿지", loc:"중국 후난성", badge:"아바타 배경지", desc:"영화 아바타의 배경이 된 장가계 아바타산(남천일주)의 기암 절벽 트레킹과 세계 최장 유리 다리 체험은 현실이 아닌 것 같은 짜릿함을 선사해요.", tags:["기암절벽","유리다리","케이블카"], tip:"황룡동굴(7억 년 된 석회암 동굴)과 함께 2박 3일 코스로 묶으면 장가계 여행이 완성돼요." },
      { name:"일본 홋카이도 스키·파우더 스노우", loc:"일본 홋카이도", badge:"세계 최고 파우더 스노우", desc:"세계 스키어들이 꿈꾸는 홋카이도 니세코의 파우더 스노우는 지구상 최고 수준이에요. 스키 후 온천에 몸을 담그는 홋카이도 겨울 여행의 공식 코스예요.", tags:["스키","파우더스노우","온천"], tip:"12월 말~2월이 파우더 스노우 최고 시즌이에요. 스키 렌탈과 리프트권 사전 예약을 추천해요." },

      { name:"말레이시아 코타키나발루 키나발루산 등반", loc:"말레이시아 사바", badge:"동남아 최고봉", desc:"동남아 최고봉 키나발루산(4095m) 등반과 투명한 바다 섬 투어를 함께 즐길 수 있는 코타키나발루는 아시아 어드벤처 여행의 완성이에요.", tags:["키나발루산","등반","스노클링"], tip:"키나발루산 등반 허가는 사전 예약 필수예요. 정상에서 맞이하는 일출이 등반의 보상이에요." },
      { name:"태국 치앙마이 집라인·코끼리 체험", loc:"태국 치앙마이", badge:"정글 어드벤처", desc:"치앙마이 밀림 위를 가로지르는 집라인과 코끼리 생태 보호 캠프 체험은 태국 북부에서만 즐길 수 있는 특별한 어드벤처예요.", tags:["집라인","코끼리","정글"], tip:"플라이트오브기번 집라인이 가장 안전하고 유명해요. 코끼리 캠프는 학대 없는 윤리적 운영 업체를 선택해요." },
      { name:"인도네시아 롬복 린자니 화산 등반", loc:"인도네시아 롬복", badge:"화산 칼데라 트레킹", desc:"해발 3726m 린자니 화산의 파란 칼데라 호수를 품은 등반은 아시아 최고의 화산 트레킹으로 꼽혀요. 발리 옆 섬이지만 훨씬 때 묻지 않은 자연이에요.", tags:["화산등반","칼데라","롬복"], tip:"2박 3일 가이드 투어가 일반적이에요. 우기(11~3월)는 등반 불가 시기이니 건기에 방문해요." }

    "역사·예술": [

      { name:"인도 타지마할·아그라", loc:"인도 우타르프라데시", badge:"사랑의 건축물", desc:"무굴 황제 샤 자한이 아내를 위해 22년에 걸쳐 지은 타지마할은 세계 7대 불가사의 중 하나예요. 새벽 안개 속에서 서서히 드러나는 타지마할은 평생 잊지 못할 풍경이에요.", tags:["세계7대불가사의","무굴","대리석"], tip:"금요일 휴관이에요. 일출 직후 첫 입장 시간에 방문하면 안개와 빛이 가장 아름다워요." },
      { name:"미얀마 바간 파고다 열기구", loc:"미얀마 바간", badge:"2000개 불탑의 평원", desc:"2000여 개의 불탑이 광활한 평원에 펼쳐진 바간을 열기구에서 내려다보면 인류 역사상 가장 장엄한 풍경 중 하나를 경험하게 돼요.", tags:["불탑","열기구","석양"], tip:"건기(11~3월)에만 열기구 투어가 가능해요. 6개월 전 사전 예약이 필요한 인기 투어예요." },
      { name:"베트남 호이안 올드타운", loc:"베트남 꽝남성", badge:"유네스코 고대 항구 도시", desc:"16~17세기 국제 무역항의 모습이 그대로 남아있는 호이안은 낮에는 노란 건물들 사이 골목이, 밤에는 강에 떠있는 수백 개의 등불이 세상에서 가장 낭만적인 풍경을 만들어요.", tags:["유네스코","등불축제","황금건물"], tip:"매월 음력 14일 보름 등불 축제가 열려요. 강에 소원 담긴 등불을 띄우는 체험이 특별해요." },
      { name:"터키 이스탄불 아야소피아·블루모스크", loc:"터키 이스탄불", badge:"동서양의 교차점", desc:"아시아와 유럽 두 대륙에 걸쳐있는 이스탄불은 아야소피아, 블루모스크, 그랜드 바자르, 돌마바흐체 궁전이 모여있는 세계사의 중심이에요.", tags:["아야소피아","모스크","그랜드바자르"], tip:"보스포루스 해협 페리를 타고 유럽 쪽 에미뇌뉘에서 아시아 쪽 카드쾨이로 건너가는 경험이 특별해요." },
      { name:"라오스 루앙프라방", loc:"라오스", badge:"유네스코 불교 도시", desc:"메콩강 변의 고요한 불교 도시 루앙프라방은 새벽 탁발 행렬의 고요함과 왓시엥통 사원의 화려한 모자이크가 인상적인 유네스코 세계문화유산 도시예요.", tags:["탁발","사원","메콩강"], tip:"새벽 5시 30분 탁발 의식은 조용히 멀리서 존중하며 관람해야 해요. 플래시는 절대 금지예요." },
      { name:"인도 조드푸르·자이푸르", loc:"인도 라자스탄", badge:"인도 사막의 왕국", desc:"온 도시가 파란색인 블루시티 조드푸르, 핑크시티 자이푸르, 골든시티 자이살메르까지 라자스탄은 인도에서 가장 화려하고 웅장한 역사 왕국들의 연속이에요.", tags:["블루시티","요새","사막"], tip:"조드푸르 메헤랑가르 요새에서 일몰을 바라보는 풍경은 인도 여행 최고의 하이라이트예요." },
      { name:"대만 타이난 사원·역사 투어", loc:"대만 타이난", badge:"대만 역사 수도", desc:"대만에서 가장 오래된 도시 타이난에는 정성공 유적, 치칸러우, 안핑 고성 등 400년 역사가 살아숨쉬는 사원과 유적들이 걷는 거리마다 가득해요.", tags:["사원","역사유적","정성공"], tip:"타이난 선농 스트리트의 우육탕과 망고 빙수는 타이난 미식 탐방의 필수 코스예요." }

    "휴양·바다": [

      { name:"발리 꾸따·짱구 비치", loc:"인도네시아 발리", badge:"서핑+풀빌라 천국", desc:"세계적 서핑 명소 꾸따 비치, 인스타그래머의 성지 짱구, 럭셔리 풀빌라 숙박까지 발리는 힐링과 액티비티를 동시에 즐길 수 있는 아시아 최고의 휴양지예요.", tags:["서핑","풀빌라","선셋"], tip:"짱구 에코 비치의 일몰 카페는 예약 필수예요. 스쿠터를 빌려 발리를 자유롭게 돌아다니는 것도 방법이에요." },

// ─────────────────────────────────────────────
// 칩 선택
// ─────────────────────────────────────────────
document.querySelectorAll('.chip-group').forEach(group => {
  group.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const was = chip.classList.contains('selected');
      group.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
      if (!was) chip.classList.add('selected');
    });
  });
});

function getSelected(id) {
  const c = document.querySelector('#' + id + ' .chip.selected');
  return c ? c.dataset.value : null;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getRecommendations() {
  const companion = getSelected('companions');
  const region = getSelected('region');
  const style = getSelected('style');
  const duration = getSelected('duration');
  const budget = getSelected('budget');

  if (!companion || !region || !style || !duration || !budget) {
    alert('모든 항목을 선택해 주세요 :)');
    return;
  }

  const pool = DB[region]?.[style] || [];
  if (pool.length === 0) {
    alert('조합에 맞는 데이터가 없어요. 다른 조건을 선택해보세요!');
    return;
  }

  // 기간/예산 기반 꿀팁 prefix
  const durationNote = {
    "당일": "📍 당일치기라면 ",
    "단기": "🌙 1~2박으로 ",
    "중기": "✈️ 3~5박 여행이라면 ",
    "장기": "🗺 1주일 이상이라면 "
  }[duration] || "";

  const budgetNote = {
    "알뜰": "💸 알뜰하게 즐기려면",
    "중간": "💳 적당한 예산으로",
    "여유": "💎 여유 있게 즐긴다면"
  }[budget] || "";

  const companionNote = {
    "혼자": "혼자 떠나는",
    "친구": "친구들과 함께하는",
    "연인": "연인과 함께하는",
    "가족": "가족과 함께하는"
  }[companion] || companion;

  const picks = shuffle(pool).slice(0, 4);

  document.getElementById('formCard').style.display = 'none';
  document.getElementById('resultSubtitle').textContent =
    `${companionNote} ${region} ${style} 여행 · ${durationNote}${budgetNote}`;

  const list = document.getElementById('destList');
  list.innerHTML = '';

  picks.forEach((dest, i) => {
    const card = document.createElement('div');
    card.className = 'destination-card';
    card.style.animationDelay = (i * 0.1) + 's';

    // 예산/기간에 맞는 추가 팁
    let extraTip = '';
    if (budget === '알뜰') extraTip = ' 숙소는 호스텔이나 게스트하우스를 이용하면 비용을 크게 줄일 수 있어요.';
    else if (budget === '여유') extraTip = ' 럭셔리 리조트나 파인 다이닝도 경험해보세요.';
    if (duration === '당일') extraTip += ' 짧은 시간이니 핵심 명소 1~2곳을 깊게 즐기는 걸 추천해요.';
    else if (duration === '장기') extraTip += ' 시간 여유가 있으니 현지인처럼 천천히 구석구석 탐험해보세요.';

    card.innerHTML =
      '<div class="card-top">' +
        '<div>' +
          '<div class="dest-name">' + dest.name + '</div>' +
          '<div class="dest-country">' + dest.loc + '</div>' +
        '</div>' +
        '<div class="match-badge">' + dest.badge + '</div>' +
      '</div>' +
      '<p class="dest-desc">' + dest.desc + '</p>' +
      '<div class="dest-tags">' + dest.tags.map(t => '<span class="dest-tag">' + t + '</span>').join('') + '</div>' +
      '<div class="tip-block"><strong>💡 꿀팁</strong> — ' + dest.tip + extraTip + '</div>';
    list.appendChild(card);
  });

  document.getElementById('results').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  document.getElementById('results').classList.remove('active');
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('formCard').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
